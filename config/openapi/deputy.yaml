openapi: 3.0.0
info:
  title: Deputy
  version: 1.0.0
servers:
  - url: '{{DEPUTY_BASE}}'
paths:
  /api/v1/supervise/employee/QUERY:
    post:
      summary: Get Employees
      requestBody:
        content:
          application/json:
            example:
              search:
                s1:
                  field: Active
                  type: eq
                  data: true
                s2:
                  field: Id
                  type: in
                  data: [2685, 2686]
              max: 100
              start: 0
      responses: {}
  /api/v1/resource/Roster/QUERY:
    post:
      summary: Roster for date and location
      requestBody:
        content:
          application/json:
            example:
              search:
                s1:
                  field: Date
                  type: eq
                  data: '2025-12-18'
                s2:
                  field: OperationalUnit
                  type: in
                  data: [998, 999]
              max: 500
              start: 0
      responses: {}
